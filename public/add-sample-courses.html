<!DOCTYPE html>
<html>
<head>
    <title>Add Sample Courses</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .success { color: green; margin-top: 10px; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Add Sample Courses to Database</h1>
    <p>This form will add sample courses directly to your database.</p>
    
    <form class="form" onsubmit="addSampleCourse(event)">
        <div class="form-group">
            <label for="courseTitle">Course Title:</label>
            <input type="text" id="courseTitle" value="Complete Web Development Bootcamp" required>
        </div>
        
        <div class="form-group">
            <label for="courseDescription">Description:</label>
            <textarea id="courseDescription" rows="4" required>Learn modern web development from scratch with HTML, CSS, JavaScript, React, Node.js and more. Build real projects and deploy them.</textarea>
        </div>
        
        <div class="form-group">
            <label for="coursePrice">Price:</label>
            <input type="number" id="coursePrice" value="49.99" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label for="discount">Discount (%):</label>
            <input type="number" id="discount" value="20" min="0" max="100" required>
        </div>
        
        <button type="submit">Add Course</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        async function addSampleCourse(event) {
            event.preventDefault();
            
            const courseData = {
                courseTitle: document.getElementById('courseTitle').value,
                courseDescription: document.getElementById('courseDescription').value,
                coursePrice: parseFloat(document.getElementById('coursePrice').value),
                discount: parseInt(document.getElementById('discount').value),
                isPublished: true,
                educator: "user_2sampleEducatorId123456789",
                courseContent: [
                    {
                        chapterId: "ch1",
                        chapterOrder: 1,
                        chapterTitle: "Introduction to Web Development",
                        chapterContent: [
                            {
                                lectureId: "lec1",
                                lectureTitle: "Course Overview",
                                lectureDuration: 15,
                                lectureUrl: "https://sample-videos.com/lecture1.mp4",
                                isPreviewFree: true,
                                lectureOrder: 1
                            },
                            {
                                lectureId: "lec2",
                                lectureTitle: "Setting Up Development Environment",
                                lectureDuration: 25,
                                lectureUrl: "https://sample-videos.com/lecture2.mp4",
                                isPreviewFree: false,
                                lectureOrder: 2
                            }
                        ]
                    }
                ]
            };
            
            try {
                const response = await fetch('http://localhost:5000/api/educator/add-course', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk_test_B47RxknvVinoJYqxBwOrx1Gs6xfWRqrMCNrBtjNf2M'
                    },
                    body: JSON.stringify(courseData)
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('result');
                
                if (result.success) {
                    resultDiv.innerHTML = '<div class="success">✅ Course added successfully! You can now view it in the Courses List.</div>';
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ Error: ' + result.message + '</div>';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
